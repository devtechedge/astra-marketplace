name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://astra:astra@localhost:5432/astra_marketplace?schema=public
      APP_SECRET: astra-marketplace-ci-secret
      PAYMENT_PROVIDER: mock
      EMAIL_PROVIDER: mock
      SMS_PROVIDER: mock
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build